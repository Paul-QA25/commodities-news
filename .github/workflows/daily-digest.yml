name: Daily Commodities RSS Digest

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS fetch script
        run: python3 fetch_commodities_rss.py

      - name: Commit new digest / log files back to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commodities_digest_*.txt commodities_feed_log.jsonl seen_articles.json
          git diff --staged --quiet || git commit -m "Daily digest: $(date -u +'%Y-%m-%d')"
          git push
